<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Register | E-Bus</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- Header -->
  <header class="header">
    <h1>🚌 E-Bus</h1>
    <nav>
      <a href="index.html">Home</a>
      <a href="login.html">Login</a>
    </nav>
  </header>

  <!-- Register Card -->
  <main class="auth-container">
    <div class="auth-card">
      <h2>Create Account</h2>
      <p>Join E-Bus and start your journey</p>

      <form class="auth-form" id="registerForm">
        <input type="email" id="email" placeholder="Email address" required />

        <input type="password" id="password" placeholder="Password" required />

        <select id="role" required>
          <option value="" disabled selected>Select role</option>
          <option value="user">User</option>
          <option value="driver">Driver</option>
        </select>

        <button type="submit" id="registerBtn">Create Account</button>
      </form>

      <p style="margin-top: 14px; font-size: 13px;">
        Already have an account?
        <a href="login.html" style="color:#667eea; font-weight:600;">Login</a>
      </p>
    </div>
  </main>

  <!-- Script -->
  <script type="module">
    import { registerUser } from "./auth.js";

    const form = document.getElementById("registerForm");

    form.addEventListener("submit", (e) => {
      e.preventDefault();
      registerUser(email.value, password.value, role.value);
    });
  </script>

</body>
</html>
